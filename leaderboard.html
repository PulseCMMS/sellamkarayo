<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - World Cup Final</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .leader-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }
        .leader-card.rank-1 {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }
        .leader-card.rank-2 {
            border-color: #C0C0C0;
            background: rgba(192, 192, 192, 0.1);
        }
        .leader-card.rank-3 {
            border-color: #CD7F32;
            background: rgba(205, 127, 50, 0.1);
        }
        .leader-info {
            display: flex;
            flex-direction: column;
        }
        .leader-name {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .leader-details {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        .leader-score {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Back</a>
            <h2>Leaderboard</h2>
        </div>

        <div class="glass-card">
            <div id="leaderboardList" class="leaderboard-list">
                <p class="text-center" style="color: var(--text-muted);">No predictions found.</p>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/leaderboard.js"></script>
</body>
</html>
