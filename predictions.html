<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Predictions - World Cup Final</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Back</a>
            <h2>Predictions</h2>
        </div>

        <div class="glass-card" id="prediction-form-card">
            <p class="subtitle">Make your predictions for the Final!</p>
            <form id="predictionForm">
                <div class="form-group">
                    <label>Player Name</label>
                    <input type="text" id="playerName" required>
                </div>
                <div class="form-group">
                    <label>Team to Win</label>
                    <select id="teamToWin" required>
                        <option value="" disabled selected>Select Team...</option>
                        <option value="Team A">Team A</option>
                        <option value="Team B">Team B</option>
                        <option value="Draw">Draw</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Final Score (e.g., 2-1)</label>
                    <input type="text" id="finalScore" required>
                </div>
                <div class="form-group">
                    <label>First Goal Team</label>
                    <select id="firstGoalTeam">
                        <option value="">None / No Goal</option>
                        <option value="Team A">Team A</option>
                        <option value="Team B">Team B</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>First Goal Scorer</label>
                    <select id="firstGoalScorer">
                        <option value="">None / No Goal</option>
                        <optgroup label="Team A">
                            <option value="Player A1">Player A1</option>
                            <option value="Player A2">Player A2</option>
                            <option value="Player A3">Player A3</option>
                        </optgroup>
                        <optgroup label="Team B">
                            <option value="Player B1">Player B1</option>
                            <option value="Player B2">Player B2</option>
                            <option value="Player B3">Player B3</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>Minute of First Goal</label>
                    <input type="number" id="minuteOfFirstGoal">
                </div>
                <div class="form-group">
                    <label>Total Goals</label>
                    <input type="number" id="totalGoals">
                </div>
                <div class="form-group">
                    <label>Yellow Cards</label>
                    <input type="number" id="yellowCards">
                </div>
                <div class="form-group">
                    <label>Red Cards</label>
                    <input type="number" id="redCards">
                </div>
                <div class="form-group">
                    <label>Corners</label>
                    <input type="number" id="corners">
                </div>
                <div class="form-group">
                    <label>Will Match Go To Extra Time?</label>
                    <select id="extraTime">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Penalty Shootout?</label>
                    <select id="penaltyShootout">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Man of the Match</label>
                    <select id="motm">
                        <option value="">Select Player...</option>
                        <optgroup label="Team A">
                            <option value="Player A1">Player A1</option>
                            <option value="Player A2">Player A2</option>
                            <option value="Player A3">Player A3</option>
                        </optgroup>
                        <optgroup label="Team B">
                            <option value="Player B1">Player B1</option>
                            <option value="Player B2">Player B2</option>
                            <option value="Player B3">Player B3</option>
                        </optgroup>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" id="saveBtn">Save Predictions</button>
            </form>
            <button class="btn btn-secondary" id="lockBtn" style="margin-top: 1rem; border-color: var(--danger); color: var(--danger);">Lock Predictions</button>
        </div>
        
        <div class="glass-card hidden" id="locked-message">
            <h3 class="text-center" style="color: var(--primary);">Predictions Locked!</h3>
            <p class="text-center" style="margin-top:1rem;">Your predictions are saved. Enjoy the game!</p>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/predictions.js"></script>
</body>
</html>
