<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Predictions - World Cup Final</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Back</a>
            <h2>Predictions</h2>
        </div>

        <div class="glass-card" id="prediction-form-card">
            <p class="subtitle">Make your predictions for the Final!</p>
            <form id="predictionForm">
                <div class="form-group">
                    <label>Player Name</label>
                    <input type="text" id="playerName" required>
                </div>
                <div class="form-group">
                    <label>Team to Win</label>
                    <select id="teamToWin" required>
                        <option value="" disabled selected>Select Team...</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Spain">Spain</option>
                        <option value="Draw">Draw</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Final Score</label>
                    <select id="finalScore" required>
                        <option value="" disabled selected>Select Score...</option>
                        <option value="0-0">0-0</option>
                        <option value="1-0">1-0</option>
                        <option value="0-1">0-1</option>
                        <option value="1-1">1-1</option>
                        <option value="2-0">2-0</option>
                        <option value="0-2">0-2</option>
                        <option value="2-1">2-1</option>
                        <option value="1-2">1-2</option>
                        <option value="2-2">2-2</option>
                        <option value="3-0">3-0</option>
                        <option value="0-3">0-3</option>
                        <option value="3-1">3-1</option>
                        <option value="1-3">1-3</option>
                        <option value="3-2">3-2</option>
                        <option value="2-3">2-3</option>
                        <option value="3-3">3-3</option>
                        <option value="4-0">4-0</option>
                        <option value="0-4">0-4</option>
                        <option value="4-1">4-1</option>
                        <option value="1-4">1-4</option>
                        <option value="4-2">4-2</option>
                        <option value="2-4">2-4</option>
                        <option value="4-3">4-3</option>
                        <option value="3-4">3-4</option>
                        <option value="4-4">4-4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>First Goal Team</label>
                    <select id="firstGoalTeam">
                        <option value="">None / No Goal</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Spain">Spain</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>First Goal Scorer</label>
                    <select id="firstGoalScorer">
                        <option value="">None / No Goal</option>
                        <optgroup label="Argentina">
                            <option value="Lionel Messi">Lionel Messi</option>
                            <option value="Lautaro Martínez">Lautaro Martínez</option>
                            <option value="Julián Álvarez">Julián Álvarez</option>
                            <option value="Thiago Almada">Thiago Almada</option>
                            <option value="Nicolás González">Nicolás González</option>
                            <option value="Giuliano Simeone">Giuliano Simeone</option>
                            <option value="Nico Paz">Nico Paz</option>
                            <option value="Enzo Fernández">Enzo Fernández</option>
                            <option value="Alexis Mac Allister">Alexis Mac Allister</option>
                            <option value="Rodrigo De Paul">Rodrigo De Paul</option>
                            <option value="Cristian Romero">Cristian Romero</option>
                            <option value="Other Argentina Player">Other Argentina Player</option>
                        </optgroup>
                        <optgroup label="Spain">
                            <option value="Lamine Yamal">Lamine Yamal</option>
                            <option value="Mikel Oyarzabal">Mikel Oyarzabal</option>
                            <option value="Dani Olmo">Dani Olmo</option>
                            <option value="Ferran Torres">Ferran Torres</option>
                            <option value="Nico Williams">Nico Williams</option>
                            <option value="Pedri">Pedri</option>
                            <option value="Fabián Ruiz">Fabián Ruiz</option>
                            <option value="Gavi">Gavi</option>
                            <option value="Rodri">Rodri</option>
                            <option value="Álex Baena">Álex Baena</option>
                            <option value="Martín Zubimendi">Martín Zubimendi</option>
                            <option value="Other Spain Player">Other Spain Player</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Total Goals</label>
                    <input type="number" id="totalGoals">
                </div>
                <div class="form-group">
                    <label>Yellow Cards</label>
                    <input type="number" id="yellowCards">
                </div>
                <div class="form-group">
                    <label>Red Cards</label>
                    <input type="number" id="redCards">
                </div>
                <div class="form-group">
                    <label>Corners</label>
                    <input type="number" id="corners">
                </div>
                <div class="form-group">
                    <label>Will Match Go To Extra Time?</label>
                    <select id="extraTime">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Penalty Shootout?</label>
                    <select id="penaltyShootout">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Man of the Match</label>
                    <select id="motm">
                        <option value="">Select Player...</option>
                        <optgroup label="Argentina">
                            <option value="Lionel Messi">Lionel Messi</option>
                            <option value="Lautaro Martínez">Lautaro Martínez</option>
                            <option value="Julián Álvarez">Julián Álvarez</option>
                            <option value="Thiago Almada">Thiago Almada</option>
                            <option value="Nicolás González">Nicolás González</option>
                            <option value="Giuliano Simeone">Giuliano Simeone</option>
                            <option value="Nico Paz">Nico Paz</option>
                            <option value="Enzo Fernández">Enzo Fernández</option>
                            <option value="Alexis Mac Allister">Alexis Mac Allister</option>
                            <option value="Rodrigo De Paul">Rodrigo De Paul</option>
                            <option value="Cristian Romero">Cristian Romero</option>
                            <option value="Other Argentina Player">Other Argentina Player</option>
                        </optgroup>
                        <optgroup label="Spain">
                            <option value="Lamine Yamal">Lamine Yamal</option>
                            <option value="Mikel Oyarzabal">Mikel Oyarzabal</option>
                            <option value="Dani Olmo">Dani Olmo</option>
                            <option value="Ferran Torres">Ferran Torres</option>
                            <option value="Nico Williams">Nico Williams</option>
                            <option value="Pedri">Pedri</option>
                            <option value="Fabián Ruiz">Fabián Ruiz</option>
                            <option value="Gavi">Gavi</option>
                            <option value="Rodri">Rodri</option>
                            <option value="Álex Baena">Álex Baena</option>
                            <option value="Martín Zubimendi">Martín Zubimendi</option>
                            <option value="Other Spain Player">Other Spain Player</option>
                        </optgroup>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" id="saveBtn">Save Predictions</button>
            </form>
            <button class="btn btn-secondary" id="lockBtn" style="margin-top: 1rem; border-color: var(--danger); color: var(--danger);">Lock Predictions</button>
        </div>
        
        <div class="glass-card hidden" id="locked-message">
            <h3 class="text-center" style="color: var(--primary);">Predictions Locked!</h3>
            <p class="text-center" style="margin-top:1rem;">Your predictions are saved. Enjoy the game!</p>
            <div style="display: flex; justify-content: center; margin-top: 1rem;">
                <button class="btn btn-primary" id="refreshScoreBtn">Check My Score</button>
            </div>
            <div id="score-display" class="hidden text-center" style="margin-top:1.5rem; font-size: 1.5rem; font-weight: bold; color: var(--primary); background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                Your Score: <span id="user-score">0</span>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/predictions.js"></script>
</body>
</html>
